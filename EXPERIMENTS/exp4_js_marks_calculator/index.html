<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiment 4 - Student Result Calculator</title>
  <style>
    body{font-family:Arial;background:#f2f2f2;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.box{background:white;width:420px;padding:35px;border-radius:15px;box-shadow:0 0 15px #aaa;text-align:center}input{width:90%;padding:10px;margin:12px;border:1px solid #777}button{background:blue;color:white;border:0;padding:12px 25px;border-radius:6px;font-weight:bold;cursor:pointer}#result{margin-top:20px;font-size:20px;font-weight:bold}
  </style>
</head>
<body>
  <div class="box">
    <h1>Student Result Calculator</h1>
    <label>Enter Number of Subjects</label>
    <input type="number" id="subjects" placeholder="Enter subjects">
    <button onclick="calculateResult()">Calculate Result</button>
    <div id="result"></div>
  </div>

  <script>
    function calculateResult(){
      let n = Number(document.getElementById('subjects').value);
      let total = 0;
      if(n <= 0){ alert('Please enter valid number of subjects'); return; }
      for(let i = 1; i <= n; i++){
        let marks = Number(prompt('Enter marks for Subject ' + i));
        total += marks;
      }
      let average = total / n;
      let grade;
      if(average >= 90) grade = 'A+';
      else if(average >= 75) grade = 'A';
      else if(average >= 60) grade = 'B';
      else if(average >= 40) grade = 'C';
      else grade = 'Fail';
      let status = average >= 40 ? 'PASS' : 'FAIL';
      document.getElementById('result').innerHTML = `Total Marks: ${total}<br>Average Marks: ${average.toFixed(2)}<br>Grade: ${grade}<br>Result: ${status}`;
    }
  </script>
</body>
</html>
