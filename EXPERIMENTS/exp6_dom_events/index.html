<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiment 6 - DOM Events</title>
  <style>
    body{font-family:Arial;background:#eee;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.box{background:white;width:650px;padding:35px;border-radius:12px;box-shadow:0 0 15px #aaa;text-align:center}input{padding:10px;width:300px;margin:10px}button{background:#0d8bf2;color:white;border:0;padding:10px 14px;margin:6px;border-radius:5px;cursor:pointer}p{font-size:18px}
  </style>
</head>
<body>
  <div class="box">
    <h1 id="heading">Welcome to JavaScript Lab</h1>
    <input type="text" id="inputText" placeholder="Enter new heading text"><br>
    <button id="changeHeading">Change Heading</button>
    <button id="changeBg">Change Background</button>
    <button id="fontSize">Increase Font Size</button>
    <button id="togglePara">Show/Hide Paragraph</button>
    <button id="reset">Reset</button>
    <p id="para">This is a sample paragraph. JavaScript events can dynamically change content.</p>
  </div>

  <script>
    const heading = document.getElementById('heading');
    const para = document.getElementById('para');
    document.getElementById('changeHeading').addEventListener('click', function(){
      let text = document.getElementById('inputText').value;
      heading.innerText = text || 'JavaScript is a scripting language used to make web pages interactive and dynamic.';
    });
    document.getElementById('changeBg').addEventListener('click', function(){ document.body.style.backgroundColor = '#20e3c2'; });
    document.getElementById('fontSize').addEventListener('click', function(){ para.style.fontSize = '26px'; });
    document.getElementById('togglePara').addEventListener('click', function(){ para.style.display = para.style.display === 'none' ? 'block' : 'none'; });
    document.getElementById('reset').addEventListener('click', function(){
      heading.innerText = 'Welcome to JavaScript Lab'; para.innerText = 'This is a sample paragraph. JavaScript events can dynamically change content.'; para.style.display='block'; para.style.fontSize='18px'; document.body.style.backgroundColor='#eee'; document.getElementById('inputText').value='';
    });
  </script>
</body>
</html>
